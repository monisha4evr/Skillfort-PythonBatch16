<form action="" method="POST">
    {% csrf_token %}
    Student Name<input type="text" name="student_name" id="student_name">
    depart_name<input type="text" name="depart_name" id="depart_name">
    address<input type="text" name="address" id="address">
    course<input type="text" name="course" id="course">
    fees_paid<input type="text" name="fees_paid" id="fees_paid">
    <button>Register</button>

</form>
<hr>

<h2>Student LIST<h2>
    <table>
        <tr>
            <th>Student Name</th>
            <th>Department Name</th>
            <th>Address</th>
            <th>Course</th>
            <th>Fees Paid</th>
            <th>Action</th>
        </tr>

    
{% for sd in student_details%}
<tr>
    
   <td>{{sd.student_name}}</td> 
    <td>{{sd.depart_name}}</td> 
    <td>{{sd.address}}</td> 
    <td>{{sd.course}}</td> 
    <td>{{sd.fees_paid}}</td> 
    <td> <a href="{% url 'update_student' sd.id %}">Edit</a>
    |
    <a href="{% url 'delete_student' sd.id %}"
       onclick="return confirm('Delete this Student?')">
       Delete
    </a></td>
</tr>
{%endfor%}
</table>
