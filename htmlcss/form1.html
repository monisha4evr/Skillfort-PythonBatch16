<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form action="">
        <div id="first_name">
            <label for="firstname">First Name</label>
            <input type="text" placeholder="Firstname" name="firstname" id="firstname" >
        </div>
        <div>
            <label for="password">Password</label>
            <input type="password" name="password" id="pasword" required>
            
        </div>
        <div>
            <label for="mbl">Mobile</label>
            <input type="number" name="mbl" id="mbl">
        </div>
        <div>
            <label for="gender">Gender</label>
            <input type="radio" value="male" name="gender" id="">
            <input type="radio" value="female" name="gender" id="">
        </div>
        <div>
            <label for="course">Course</label>
            <input type="checkbox"  name="python" id=""> Python
            <input type="checkbox"  name="Java" id="">Java
            <input type="hidden" name="hid_number" value="123">
        </div>
        <div>
            <button>Click Me</button>
        </div>
    </form>
    
    
</body>
</html>
