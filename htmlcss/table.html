<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table{
            border-spacing: 20px;
           
        }
        table,tr,td,th{
            border:1px solid red;

        }

        td,th{
             padding:10px;
        }

       
    </style>
</head>
<body>
    <table>
    <tr ><th colspan="5" style="text-align:center;background-color:yellow;">Student Mark List</th></tr>
    <tr>
        <td colspan="2" style="text-align:center;">Student Details</td>
        <td colspan="3" style="text-align:center;">Marks</td>
    </tr>
    <tr>
        <th style="color:blue;">S.no</th>
        <th style="color:blue;">Student Name</th>
        <th style="color:blue;">M1</th>
        <th style="color:blue;">M2</th>
        <th style="color:blue;">M3</th>
    </tr>
    </tr>
    <tr>
        <td>1</td>
        <td>Tamil</td>
        <td>20</td>
        <td>30</td>
        <td>40</td>
    </tr>
    </tr>
    <tr>
        <td>2</td>
        <td>Nagaraj</td>
        <td>10</td>
        <td>20</td>
        <td>30</td>
    </tr>

</table>


    
</body>
</html>
