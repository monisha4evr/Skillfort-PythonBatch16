<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex</title>
    <style>
        img{
            height: 50px;
            width: 50px;
            border-radius: 50%;
        }
        .navbar{
            display: flex;
            justify-content: space-between;
        }
        a{
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <img src="sample.jpg" alt="">
        <div>
            <a href=""> About</a>
            <a href=""> Course</a>
            <a href=""> Contact</a>
        </div>
    </div>
</body>
</html>
