<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <style>
        div{
            background-color: aqua;
            height: 300px;
            width:200px;
            transition: width 2s ease;
        }
        div:hover{
            width: 300px;
            background-color: blue;
        }
    </style>
</head>
<body>
    <div>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Suscipit dolorem dignissimos enim officia nobis ipsum sit modi ad magni inventore quae natus nisi eligendi, non praesentium totam, laboriosam quibusdam repellat.</p>
    </div>
</body>
</html>
