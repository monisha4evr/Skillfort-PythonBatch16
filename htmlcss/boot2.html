<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive screen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <div class="container my-4">
        <h4>Responsive Page</h4>
        <div class="row text-center">
            <div class="col-12  col-md-6 col-lg-4 text-danger bg-info border"> A</div>
            <div class="col-12 col-md-6 col-lg-4 text-info bg-success" > B</div>
            <div class="col-12 col-md-12 col-lg-4 text-warning bg-dark"> C</div>
        </div>
    </div>

    <div class="container">
        <form action="">
            <div class="mb-3">
                <label for="firstname" class="form-label"> First Name</label>
                <input type="text" class="form-control" name="firstname" id="firstname">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label"> Password</label>
                <input type="password" class="form-control" name="password" id="password">
            </div>
            <button type="submit" class="btn btn-primary fw-bold w-100"> submit</button>
        </form>
        
    </div>

</body>
</html>
