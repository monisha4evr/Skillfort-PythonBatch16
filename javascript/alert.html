<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alert box</title>
</head>
<body>

    1. alert -  display the Content
    2. prompt -  To get Values from User
    3. confirm - to get Confirmation from User

    To add Value in html Element 
    1. innerHTML
    2. innerText 
    3. textContent

    <div>
        A Value is: <span id="a_value"></span><br>
        B Value is: <span id="b_value"></span><br>
        C Value is: <span id="c_value"></span>
    </div>


    <script>
        /* alert("hi! wlecom to Javascript ") 
         prompt("Enter your Value") 
         confirm("Are you Sure to Delete!")*/

        let a= prompt("Enter a Value")
        let b= prompt("Enter b Value")
        c=Number(a)+Number(b)
        console.log(c)
        a_val=document.getElementById('a_value')
        b_val=document.getElementById('b_value')
        c_val=document.getElementById('c_value')
        a_val.innerHTML=a
        b_val.innerHTML=b
        c_val.innerHTML=c

        /*console.log(a,b)*/
        
    </script>
</body>
</html>
